<mat-card class="backend-card">
  <mat-card-header>{{ title }}</mat-card-header>
  <mat-card-content>
    <mat-list>
      <mat-list-item *ngFor="let entry of entries">
        <span>{{ entry.icon }}</span>
        <span>{{ entry.name }}</span>
      </mat-list-item>
    </mat-list>
  </mat-card-content>
</mat-card>
