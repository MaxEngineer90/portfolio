<div
  [class.greeting-sm]="currentBreakpoint === breakpointEnum.Small"
  [class.greeting-xs]="currentBreakpoint === breakpointEnum.XSmall"
  class="greeting"
>
  <span
    [class.font-size-h1-lg]="currentBreakpoint === breakpointEnum.Large"
    [class.font-size-h1-md]="currentBreakpoint === breakpointEnum.Medium"
    [class.font-size-h1-sm]="currentBreakpoint === breakpointEnum.Small"
    [class.font-size-h1-xl]="currentBreakpoint === breakpointEnum.XLarge"
    [class.font-size-h1-xs]="currentBreakpoint === breakpointEnum.XSmall"
    >Hey, ich bin Maximilian Lamm</span
  >

  <span
    [class.font-size-h2-lg]="currentBreakpoint === breakpointEnum.Large"
    [class.font-size-h2-md]="currentBreakpoint === breakpointEnum.Medium"
    [class.font-size-h2-sm]="currentBreakpoint === breakpointEnum.Small"
    [class.font-size-h2-xl]="currentBreakpoint === breakpointEnum.XLarge"
    [class.font-size-h2-xs]="currentBreakpoint === breakpointEnum.XSmall"
    >Und ein {{ displayText }}</span
  >
</div>

<div class="history-social-container">
  <div class="history">
    <span
      [class.font-size-text-lg]="currentBreakpoint === breakpointEnum.Large"
      [class.font-size-text-md]="currentBreakpoint === breakpointEnum.Medium"
      [class.font-size-text-sm]="currentBreakpoint === breakpointEnum.Small"
      [class.font-size-text-xl]="currentBreakpoint === breakpointEnum.XLarge"
      [class.font-size-text-xs]="currentBreakpoint === breakpointEnum.XSmall"
    >
      Im Jahr 2019 schloss ich erfolgreich meine Umschulung zum Fachinformatiker
      für Anwendungsentwicklung ab.
    </span>
    <span
      [class.font-size-text-lg]="currentBreakpoint === breakpointEnum.Large"
      [class.font-size-text-md]="currentBreakpoint === breakpointEnum.Medium"
      [class.font-size-text-sm]="currentBreakpoint === breakpointEnum.Small"
      [class.font-size-text-xl]="currentBreakpoint === breakpointEnum.XLarge"
      [class.font-size-text-xs]="currentBreakpoint === breakpointEnum.XSmall"
    >
      Seitdem habe ich die Gelegenheit genutzt, meine Kenntnisse und Fähigkeiten
      zu vertiefen.
    </span>
  </div>

  <div
    [class.social-container-sm]="
      currentBreakpoint === breakpointEnum.XSmall ||
      currentBreakpoint === breakpointEnum.Small
    "
    class="social-container"
  >
    <a href="https://www.linkedin.com/feed/"
      ><img alt="linkedin icon" src="assets/icons/linkedIn.png"
    /></a>
    <a href="https://github.com/MaxEngineer90"
      ><img alt="github icon" src="assets/icons/github-mark-white.png"
    /></a>
  </div>
</div>
